name: DomainFront Relay

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON Payload {k, u, m, h, b, ct, r}'
        required: true

jobs:
  relay:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Make script executable and run
        id: proxy_exec
        run: |
          chmod +x proxy_script.sh
          bash proxy_script.sh '${{ github.event.inputs.payload }}'
        env:
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
