name: "DomainFront Relay - GitHub Edition"

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON Payload (same format as your Apps Script)'
        required: true

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq (JSON processor)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Execute Relay Script
        id: proxy_exec
        run: bash proxy_script.sh '${{ github.event.inputs.payload }}'
        env:
          AUTH_KEY: ${{ secrets.AUTH_KEY }}  # کلید امنیتی از Secrets
